<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AiBoids — Flocking Simulation</title>
  </head>
  <body>
    <div id="app">
      <header id="app-header">
        <h1>AiBoids</h1>
        <p class="subtitle" id="app-subtitle">A flocking simulation with predators</p>
      </header>
      <main id="app-main">
        <div id="canvas-stack">
          <canvas id="sim-canvas-2d"></canvas>
          <canvas id="sim-canvas-3d"></canvas>
        </div>
        <aside id="control-panel">
          <div id="control-panel-header">
            <h2 id="control-panel-heading">Controls</h2>
            <button id="control-panel-toggle" type="button" aria-label="Toggle controls panel" title="Toggle controls panel">◂</button>
          </div>
          <div id="control-panel-body"><!-- populated by ControlPanel.ts --></div>
        </aside>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
